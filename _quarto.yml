project:
  type: book
  output-dir: _site

book:
  title: "A Statistical Physics Perspective on Machine Learning"
  subtitle: "Draft chapters & lecture notes"
  author:
    - "Florent Krzakala"
    - "Bruno Loureiro"
    - "Antoine Maillard"
    - "Lenka Zdeborová"

  # TODO: replace YOUR_GITHUB_USERNAME and REPO_NAME once you confirm them
  site-url: "https://krzakala.github.io/statphys-ml-notes"
  repo-url: "https://github.com/krzakala/statphys-ml-notes"
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - part: "Chapters"
      chapters:
        - chapters/01-intro.qmd
    - part: "Open Problems"
      chapters:
        - open-problems/index.qmd
        - open-problems/OP-001.qmd

format:
  html:
    toc: true
    number-sections: true
    theme: cosmo

bibliography: references.bib
